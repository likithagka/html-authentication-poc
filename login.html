<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="User Login Page">
<meta name="author" content="Assignment">
<title>Account Login</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
<link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="container d-flex justify-content-center align-items-center vh-100">

<div class="card shadow-sm">
<div class="card-body">

<h4 class="text-center mb-4 fw-bold text-dark">Account Login</h4>
<form action="dashboard.html">
<div class="mb-3">
<label for="username" class="form-label">Username</label>
<div class="input-group">
<span class="input-group-text"><i class="bi bi-person"></i></span>
<input type="text" id="username" name="username" class="form-control" placeholder="Enter your username" required>
</div>
</div>


<div class="mb-3">
<label for="loginPassword" class="form-label">Password</label>

<div class="input-group">
<span class="input-group-text">
<i class="bi bi-lock"></i>
</span>

<input type="password" class="form-control" id="loginPassword" name="password" placeholder="Enter your password" required>

<span class="input-group-text" onclick="toggleLoginPassword()" style="cursor:pointer;">
<i class="bi bi-eye"></i>
</span>
</div>
</div>
<div class="d-grid">
<button type="submit" class="btn custom-btn">Sign In</button>
</div>
</form>
<div class="text-center mt-3">
<a href="forgot-password.html" class="text-primary text-decoration-none">Forgot Password?</a>
</div>
<div class="text-center mt-2">
<span>Need an account?</span>
<a href="register.html" class="text-decoration-none fw-semibold">Register</a>
</div>

</div>
</div>

</div>


<script>
function toggleLoginPassword() {
  const input = document.getElementById("loginPassword");
  input.type = input.type === "password" ? "text" : "password";
}
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
