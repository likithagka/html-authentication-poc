<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Forgot Password Page">
<meta name="author" content="Assignment">
<title>Forgot Password</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="styles.css">

</head>

<body>

<div class="container d-flex justify-content-center align-items-center vh-100">

<div class="card shadow-sm" >
<div class="card-body p-4">

<h3 class="text-center mb-4 fw-bold text-dark">Reset Your Password</h3>

<form action="reset-password.html">

<div class="mb-3">
<label for="email" class="form-label">Enter your registered Email</label>
<input type="email" class="form-control" id="email" name="email" placeholder="Enter your email address" required>
</div>

<div class="d-grid">
<button type="submit" class="btn custom-btn">Reset Password</button>
</div>

</form>

<div class="text-center mt-3">
<a href="login.html" class="text-success text-decoration-none">Back to Login</a>
</div>

</div>
</div>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
