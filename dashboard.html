<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<link rel="stylesheet" href="styles.css">

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark shadow">
  <div class="container">
    
    <span class="navbar-brand fw-bold">
      <i class="bi bi-speedometer2"></i> Dashboard
    </span>

    <div>
      <a href="login.html" class="btn btn-danger">
        <i class="bi bi-box-arrow-right"></i> Logout
      </a>

      <button class="btn btn-outline-light ms-2" onclick="toggleDarkMode()">🌙</button>
    </div>

  </div>
</nav>

<div class="container mt-5">

  <div class="row justify-content-center mb-4">
    <div class="col-lg-8 col-md-10">

      <div class="card shadow-lg p-5 text-center dashboard-card">
        <h1 class="fw-bold mb-3">Welcome</h1>
        <p class="fs-5">You have successfully logged in.</p>
      </div>

    </div>
  </div>


<script>
function toggleDarkMode() {
  document.body.classList.toggle("dark-mode");

  if (document.body.classList.contains("dark-mode")) {
    localStorage.setItem("theme", "dark");
  } else {
    localStorage.setItem("theme", "light");
  }
}

window.onload = function () {
  if (localStorage.getItem("theme") === "dark") {
    document.body.classList.add("dark-mode");
  }
}
</script>
</body>
</html>
